# Docker Compose 配置 - Shopping 电商平台
# 一键部署：docker-compose up -d

version: '3.8'

services:
  # ============ 基础设施 ============
  
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: shopping-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: shopping
      MYSQL_USER: shopping
      MYSQL_PASSWORD: shopping123
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./SQL/shopping.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./SQL/init_order_data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopping-net

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: shopping-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopping-net

  # Zookeeper (Kafka依赖)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shopping-zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopping-net

  # Kafka 消息队列
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shopping-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - shopping-net

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: shopping-elasticsearch
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - shopping-net

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: shopping-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - shopping-net

  # ============ 微服务基础设施 ============

  # Nacos 注册中心/配置中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: shopping-nacos
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - shopping-net

  # RocketMQ NameServer
  rocketmq-namesrv:
    image: rocketmqinc/rocketmq:4.9.7
    container_name: shopping-rmq-namesrv
    restart: always
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m"
    command: sh mqnamesrv
    volumes:
      - rmq_namesrv_logs:/home/rocketmq/logs
    networks:
      - shopping-net

  # RocketMQ Broker
  rocketmq-broker:
    image: rocketmqinc/rocketmq:4.9.7
    container_name: shopping-rmq-broker
    restart: always
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m"
    command: sh mqbroker -c /etc/rocketmq/broker.conf
    volumes:
      - rmq_broker_logs:/home/rocketmq/logs
      - rmq_broker_store:/home/rocketmq/store
    depends_on:
      - rocketmq-namesrv
    networks:
      - shopping-net

  # ============ ELK 日志平台 ============

  # Logstash 日志采集
  logstash:
    image: logstash:8.11.0
    container_name: shopping-logstash
    restart: always
    ports:
      - "5000:5000"
      - "9600:9600"
    volumes:
      - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - shopping-net

  # Kibana 日志可视化
  kibana:
    image: kibana:8.11.0
    container_name: shopping-kibana
    restart: always
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      I18N_LOCALE: zh-CN
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - shopping-net

  # ============ 后端服务 ============
  
  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopping-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shopping?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: shopping
      SPRING_DATASOURCE_PASSWORD: shopping123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_ELASTICSEARCH_URIS: elasticsearch:9200
      # LLM配置（需要替换为实际的API Key）
      LLM_API_KEY: ${LLM_API_KEY:-your-api-key-here}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-3.5-turbo}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - shopping-net

  # ============ 前端服务 ============
  
  # Vue 前端 + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopping-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - shopping-net

  # ============ 大数据服务（可选）============
  
  # 如果需要完整的大数据环境，取消注释以下服务
  # 注意：需要较多内存（至少 8GB）
  
  # Hadoop HDFS
  # hadoop:
  #   image: apache/hadoop:3
  #   container_name: shopping-hadoop
  #   hostname: hadoop-master
  #   ports:
  #     - "9870:9870"   # NameNode Web UI
  #     - "8088:8088"   # YARN Web UI
  #   environment:
  #     HADOOP_HOME: /opt/hadoop
  #   volumes:
  #     - hadoop_data:/opt/hadoop/data
  #   networks:
  #     - shopping-net

  # Hive
  # hive:
  #   image: apache/hive:3.1.3
  #   container_name: shopping-hive
  #   ports:
  #     - "10000:10000"  # HiveServer2
  #     - "9083:9083"    # Metastore
  #   environment:
  #     HIVE_METASTORE_URI: thrift://localhost:9083
  #   depends_on:
  #     - mysql
  #     - hadoop
  #   networks:
  #     - shopping-net

  # Spark
  # spark:
  #   image: apache/spark:3.5.1
  #   container_name: shopping-spark
  #   ports:
  #     - "4040:4040"    # Spark Web UI
  #     - "18080:18080"  # History Server
  #   environment:
  #     SPARK_MASTER: local[*]
  #   depends_on:
  #     - hadoop
  #     - hive
  #   networks:
  #     - shopping-net

# ============ 数据卷 ============
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_log:
    driver: local
  kafka_data:
    driver: local
  elasticsearch_data:
    driver: local
  minio_data:
    driver: local
  nacos_data:
    driver: local
  rmq_namesrv_logs:
    driver: local
  rmq_broker_logs:
    driver: local
  rmq_broker_store:
    driver: local
  # hadoop_data:
  #   driver: local

# ============ 网络 ============
networks:
  shopping-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
